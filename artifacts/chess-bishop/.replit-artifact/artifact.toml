kind = "web"
previewPath = "/"
title = "Chess Bishop"
version = "1.0.0"
id = "artifacts/chess-bishop"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 21445
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/chess-bishop run dev"

[services.env]
PORT = "21445"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/chess-bishop", "run", "build"]
publicDir = "artifacts/chess-bishop/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
